# =============================================================
# iTrade — GitHub Actions CD: Deploy to Google Compute Engine
# =============================================================
#
# Triggers: push to 'main' branch, or manual dispatch
#
# Strategy:
#   Job 1 — Build Docker images on CI runner → push to GHCR
#   Job 2 — SSH to GCE → pull images → docker compose up
#
# This is MUCH faster than building on GCE because:
#   - GitHub runners have 2 vCPU + 7GB RAM (vs small GCE instance)
#   - Registry-level layer caching across builds
#   - GCE only needs to pull ~200MB of compressed layers
#
# Required GitHub Secrets:
#   GCE_HOST            → GCE instance external IP or domain
#   GCE_USER            → SSH username (e.g. your_gce_username)
#   GCE_SSH_PRIVATE_KEY → base64-encoded private key
#
# Required GitHub Permissions:
#   packages: write     → push images to GHCR (auto-granted via GITHUB_TOKEN)
# =============================================================

name: Deploy to GCE

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all Docker images (no cache)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1: Build Docker images on CI runner and push to GHCR
  # ════════════════════════════════════════════════════════════
  build-and-push:
    name: 🔨 Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          PREFIX="${{ env.REGISTRY }}/${REPO_LC}"
          SHA="${{ github.sha }}"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Image prefix: ${PREFIX}"

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      # ── Pull previous images for layer cache ────────────────
      - name: Pull previous images for cache
        if: github.event.inputs.force_rebuild != 'true'
        run: |
          PREFIX="${{ steps.meta.outputs.prefix }}"
          docker pull "${PREFIX}/deps:latest" 2>/dev/null && \
            docker tag "${PREFIX}/deps:latest" itrade-deps:latest || true
          docker pull "${PREFIX}/console:latest" 2>/dev/null || true
          docker pull "${PREFIX}/schema-migrator:latest" 2>/dev/null || true
          docker pull "${PREFIX}/web:latest" 2>/dev/null || true

      # ── Build shared dependencies base image ────────────────
      - name: Build deps image
        run: |
          PREFIX="${{ steps.meta.outputs.prefix }}"
          CACHE_FLAG=""
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            CACHE_FLAG="--no-cache"
          else
            CACHE_FLAG="--cache-from itrade-deps:latest"
          fi

          DOCKER_BUILDKIT=1 docker build \
            -f Dockerfile.deps \
            -t itrade-deps:latest \
            -t "${PREFIX}/deps:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            ${CACHE_FLAG} \
            .

          docker push "${PREFIX}/deps:latest"

      # ── Build and push console image ────────────────────────
      - name: Build and push console image
        run: |
          PREFIX="${{ steps.meta.outputs.prefix }}"
          SHA="${{ steps.meta.outputs.sha }}"
          CACHE_FLAG=""
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            CACHE_FLAG="--no-cache"
          else
            CACHE_FLAG="--cache-from ${PREFIX}/console:latest"
          fi

          DOCKER_BUILDKIT=1 docker build \
            -f apps/console/Dockerfile \
            --target console \
            -t "${PREFIX}/console:latest" \
            -t "${PREFIX}/console:${SHA}" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            ${CACHE_FLAG} \
            .

          docker push "${PREFIX}/console:latest"
          docker push "${PREFIX}/console:${SHA}"

      # ── Build and push schema-migrator image ────────────────
      - name: Build and push schema-migrator image
        run: |
          PREFIX="${{ steps.meta.outputs.prefix }}"
          SHA="${{ steps.meta.outputs.sha }}"
          CACHE_FLAG=""
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            CACHE_FLAG="--no-cache"
          else
            CACHE_FLAG="--cache-from ${PREFIX}/schema-migrator:latest"
          fi

          DOCKER_BUILDKIT=1 docker build \
            -f apps/console/Dockerfile \
            --target schema-migrator \
            -t "${PREFIX}/schema-migrator:latest" \
            -t "${PREFIX}/schema-migrator:${SHA}" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            ${CACHE_FLAG} \
            .

          docker push "${PREFIX}/schema-migrator:latest"
          docker push "${PREFIX}/schema-migrator:${SHA}"

      # ── Build and push web image ────────────────────────────
      - name: Build and push web image
        run: |
          PREFIX="${{ steps.meta.outputs.prefix }}"
          SHA="${{ steps.meta.outputs.sha }}"
          CACHE_FLAG=""
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            CACHE_FLAG="--no-cache"
          else
            CACHE_FLAG="--cache-from ${PREFIX}/web:latest"
          fi

          DOCKER_BUILDKIT=1 docker build \
            -f apps/web/Dockerfile \
            -t "${PREFIX}/web:latest" \
            -t "${PREFIX}/web:${SHA}" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            ${CACHE_FLAG} \
            .

          docker push "${PREFIX}/web:latest"
          docker push "${PREFIX}/web:${SHA}"

  # ════════════════════════════════════════════════════════════
  # Job 2: Pull pre-built images on GCE and restart services
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to GCE
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Decode SSH private key with error handling
          echo "${{ secrets.GCE_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/gce_deploy_key 2>/dev/null || {
            echo "❌ Failed to decode SSH private key"
            echo "The GCE_SSH_PRIVATE_KEY secret may not be properly base64 encoded"
            exit 1
          }

          chmod 600 ~/.ssh/gce_deploy_key

          # Validate SSH key format
          if ! ssh-keygen -l -f ~/.ssh/gce_deploy_key >/dev/null 2>&1; then
            echo "❌ SSH private key format is invalid"
            echo "Please check that GCE_SSH_PRIVATE_KEY is a valid SSH private key"
            exit 1
          fi

          # Start SSH agent
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/gce_deploy_key
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

          echo "✅ SSH agent configured successfully"

      - name: Add GCE host to known_hosts
        run: |
          echo "🔍 Adding GCE host to known_hosts..."
          echo "Target host: ${{ secrets.GCE_HOST }}"

          # Add host keys to known_hosts with retry
          for attempt in 1 2 3; do
            if ssh-keyscan -H -T 10 "${{ secrets.GCE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "✅ Host keys added successfully (attempt $attempt)"
              break
            else
              echo "⚠️  Host key scan failed (attempt $attempt)"
              if [ $attempt -eq 3 ]; then
                echo "❌ All host key scan attempts failed"
                echo "Will attempt connection with StrictHostKeyChecking=no"
              fi
              sleep 2
            fi
          done

      - name: Test SSH connection
        run: |
          echo "🔍 Testing SSH connection..."
          echo "User: ${{ secrets.GCE_USER }}"
          echo "Host: ${{ secrets.GCE_HOST }}"

          # Test with multiple SSH options for robustness
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"

          if ssh $SSH_OPTS -o StrictHostKeyChecking=yes "${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}" "echo 'SSH connection successful'; whoami; pwd" 2>/dev/null; then
            echo "✅ SSH connection working with StrictHostKeyChecking=yes"
          elif ssh $SSH_OPTS -o StrictHostKeyChecking=no "${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}" "echo 'SSH connection successful'; whoami; pwd" 2>/dev/null; then
            echo "✅ SSH connection working with StrictHostKeyChecking=no"
            echo "⚠️  Host key verification was bypassed"
          else
            echo "❌ SSH connection failed with both strict and non-strict host checking"
            echo "Common issues:"
            echo "  - GCE_HOST: Incorrect IP address or hostname"
            echo "  - GCE_USER: Incorrect username"
            echo "  - GCE_SSH_PRIVATE_KEY: Invalid or unauthorized SSH key"
            echo "  - Network: Firewall blocking SSH (port 22)"
            echo "  - Instance: GCE instance not running or accessible"
            exit 1
          fi

      - name: Deploy on GCE
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_USER: ${{ secrets.GCE_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PREFIX="${{ env.REGISTRY }}/${REPO_LC}"

          echo "🚀 Starting minimal deployment to GCE..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deploying commit: ${COMMIT_SHA:0:8}"
          echo "  Message: $(echo "$COMMIT_MSG" | head -1)"
          echo "  Strategy: Download docker-compose.prod.yml only (~8KB)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Use robust SSH options
          SSH_OPTS="-o ConnectTimeout=15 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=no"

          ssh $SSH_OPTS "$GCE_USER@$GCE_HOST" \
            "GITHUB_REPOSITORY='$GITHUB_REPOSITORY' COMMIT_SHA='$COMMIT_SHA' GHCR_TOKEN='$GHCR_TOKEN' GH_ACTOR='$GH_ACTOR' IMAGE_PREFIX='$IMAGE_PREFIX' bash -s" << 'ENDSSH'
            set -euo pipefail

            APP_DIR="/opt/itrade/app"
            COMPOSE_FILE="$APP_DIR/docker-compose.prod.yml"
            NGINX_CONF="/opt/itrade/nginx.conf"
            CERTBOT_ENV="/opt/itrade/.env.certbot"
            CERTS_BASE="/opt/itrade/certbot/certs"
            WEBROOT_DIR="/opt/itrade/certbot/webroot"

            # ── Download required deploy files ──
            echo "▶ Downloading deployment files..."
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            
            download_from_github() {
              local source_path="$1"
              local dest_path="$2"
              local tmp_path="${dest_path}.tmp"
              local ok=false

              if curl -fsSL --connect-timeout 10 --max-time 30 \
                "https://raw.githubusercontent.com/$GITHUB_REPOSITORY/$COMMIT_SHA/$source_path" \
                -o "$tmp_path"; then
                ok=true
              elif curl -fsSL --connect-timeout 10 --max-time 30 \
                -H "Accept: application/vnd.github.raw" \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/$source_path?ref=$COMMIT_SHA" \
                -o "$tmp_path"; then
                ok=true
              fi

              if [ "$ok" = true ] && [ -s "$tmp_path" ]; then
                mv "$tmp_path" "$dest_path"
                echo "✅ Downloaded: $source_path"
                return 0
              fi

              rm -f "$tmp_path"
              echo "❌ Failed to download: $source_path"
              return 1
            }

            download_from_github "docker-compose.prod.yml" "$COMPOSE_FILE"
            
            # Validate downloaded file
            if [ ! -s "$COMPOSE_FILE" ]; then
              echo "❌ docker-compose.prod.yml is empty"
              exit 1
            fi
            
            if ! grep -q "services:" "$COMPOSE_FILE"; then
              echo "❌ docker-compose.prod.yml is invalid (missing services)"
              exit 1
            fi
            
            FILE_SIZE=$(wc -c < "$COMPOSE_FILE")
            echo "✅ docker-compose.prod.yml valid (${FILE_SIZE} bytes)"

            # ── Fix permissions and verify environment files ──
            echo "▶ Fixing permissions and checking environment files..."
            
            # Ensure correct ownership of /opt/itrade directory
            sudo chown -R $(whoami):$(whoami) /opt/itrade/ 2>/dev/null || true
            sudo chmod 755 /opt/itrade/ 2>/dev/null || true
            sudo chmod 755 /opt/itrade/app/ 2>/dev/null || true
            sudo chmod 600 /opt/itrade/.env.* 2>/dev/null || true
            
            # Verify environment files exist
            for env_file in /opt/itrade/.env.{console,db,web,certbot}; do
              if [ ! -f "$env_file" ]; then
                echo "❌ Missing: $env_file"
                exit 1
              fi
              echo "✅ Found: $env_file"
            done
            echo "✅ All environment files present with correct permissions"

            # ── Bootstrap nginx config + SSL files if needed ──
            echo "▶ Ensuring nginx config and certificate paths exist..."
            DOMAIN=$(sed -n 's/^DOMAIN=//p' "$CERTBOT_ENV" | head -n 1 | tr -d '[:space:]"')
            if [ -z "${DOMAIN:-}" ]; then
              echo "❌ DOMAIN is missing in $CERTBOT_ENV"
              exit 1
            fi
            echo "✅ SSL domain: $DOMAIN"

            if [ -d "$NGINX_CONF" ]; then
              echo "⚠️  $NGINX_CONF is a directory; moving it away"
              mv "$NGINX_CONF" "/opt/itrade/nginx.conf.backup.$(date +%s)"
            fi

            mkdir -p "$CERTS_BASE/live/$DOMAIN" "$WEBROOT_DIR"
            {
              echo 'server {'
              echo '    listen 80;'
              echo '    listen [::]:80;'
              echo "    server_name ${DOMAIN};"
              echo ''
              echo '    location /.well-known/acme-challenge/ {'
              echo '        root /var/www/certbot;'
              echo '    }'
              echo ''
              echo '    location / {'
              echo '        return 301 https://$host$request_uri;'
              echo '    }'
              echo '}'
              echo ''
              echo 'server {'
              echo '    listen 443 ssl;'
              echo '    listen [::]:443 ssl;'
              echo '    http2 on;'
              echo "    server_name ${DOMAIN};"
              echo ''
              echo "    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;"
              echo "    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;"
              echo ''
              echo '    ssl_protocols       TLSv1.2 TLSv1.3;'
              echo '    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;'
              echo '    ssl_prefer_server_ciphers off;'
              echo '    ssl_session_cache   shared:SSL:10m;'
              echo '    ssl_session_timeout 1d;'
              echo '    ssl_session_tickets off;'
              echo ''
              echo '    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;'
              echo '    add_header X-Content-Type-Options    nosniff;'
              echo '    add_header X-Frame-Options           SAMEORIGIN;'
              echo '    add_header Referrer-Policy           "strict-origin-when-cross-origin";'
              echo ''
              echo '    client_max_body_size 10M;'
              echo ''
              echo '    location / {'
              echo '        resolver 127.0.0.11 ipv6=off valid=30s;'
              echo '        set $web_upstream web;'
              echo '        proxy_pass         http://$web_upstream:3002;'
              echo '        proxy_http_version 1.1;'
              echo '        proxy_set_header Upgrade    $http_upgrade;'
              echo '        proxy_set_header Connection "upgrade";'
              echo '        proxy_set_header Host              $host;'
              echo '        proxy_set_header X-Real-IP         $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo '        proxy_cache_bypass $http_upgrade;'
              echo '        proxy_connect_timeout 60s;'
              echo '        proxy_send_timeout    60s;'
              echo '        proxy_read_timeout    60s;'
              echo '        proxy_next_upstream error timeout http_502 http_503;'
              echo '        proxy_next_upstream_tries    2;'
              echo '        proxy_next_upstream_timeout  30s;'
              echo '    }'
              echo '}'
            } > "$NGINX_CONF"
            chmod 644 "$NGINX_CONF"

            DUMMY_CERT="$CERTS_BASE/live/$DOMAIN/fullchain.pem"
            DUMMY_KEY="$CERTS_BASE/live/$DOMAIN/privkey.pem"
            if [ ! -s "$DUMMY_CERT" ] || [ ! -s "$DUMMY_KEY" ]; then
              echo "▶ Generating temporary bootstrap certificate..."
              openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
                -keyout "$DUMMY_KEY" \
                -out "$DUMMY_CERT" \
                -subj "/CN=$DOMAIN" >/dev/null 2>&1
              echo "✅ Temporary bootstrap certificate generated"
            else
              echo "✅ Existing certificate files found"
            fi

            # ── Free host ports 80/443 for Docker nginx ──
            echo "▶ Checking host services on ports 80/443..."
            if command -v systemctl >/dev/null 2>&1 && systemctl is-active --quiet nginx; then
              echo "⚠️  Host nginx service is active; stopping it to avoid port conflicts"
              sudo systemctl stop nginx || true
              sudo systemctl disable nginx || true
            fi

            PORT_CONFLICTS=$(ss -ltn '( sport = :80 or sport = :443 )' | sed -n '2,$p' || true)
            if [ -n "$PORT_CONFLICTS" ]; then
              echo "❌ Ports 80/443 are still occupied:"
              echo "$PORT_CONFLICTS"
              echo "Please free these ports before deployment."
              exit 1
            fi
            echo "✅ Ports 80/443 are available for Docker nginx"

            # ── Login to GHCR ──
            echo "▶ Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # ── Set image references ──
            export CONSOLE_IMAGE="$IMAGE_PREFIX/console:$COMMIT_SHA"
            export SCHEMA_MIGRATOR_IMAGE="$IMAGE_PREFIX/schema-migrator:$COMMIT_SHA"
            export WEB_IMAGE="$IMAGE_PREFIX/web:$COMMIT_SHA"
            
            echo "▶ Using images:"
            echo "  Console: $CONSOLE_IMAGE"
            echo "  Schema Migrator: $SCHEMA_MIGRATOR_IMAGE"
            echo "  Web: $WEB_IMAGE"

            # ── Pull pre-built images ──
            echo "▶ Pulling pre-built images..."
            PULL_START=$(date +%s)
            
            if ! docker compose -f "$COMPOSE_FILE" pull console schema-migrator web; then
              echo "❌ Failed to pull images"
              exit 1
            fi
            
            PULL_END=$(date +%s)
            echo "✅ Images pulled in $((PULL_END - PULL_START))s"

            # ── Deploy containers (runtime only, never build on GCE) ──
            echo "▶ Starting containers..."
            DEPLOY_START=$(date +%s)
            
            if ! docker compose -f "$COMPOSE_FILE" up -d --no-build db schema-migrator console web nginx; then
              echo "❌ Failed to start containers"
              docker compose -f "$COMPOSE_FILE" logs --tail=50
              exit 1
            fi

            # ── Ensure nginx is ready before ACME challenge ──
            echo "▶ Waiting for nginx to become ready..."
            NGINX_TIMEOUT=60
            NGINX_ELAPSED=0
            until docker exec itrade-nginx nginx -t >/dev/null 2>&1; do
              if [ $NGINX_ELAPSED -ge $NGINX_TIMEOUT ]; then
                echo "❌ nginx readiness timeout"
                docker compose -f "$COMPOSE_FILE" logs --tail=50 nginx
                exit 1
              fi
              sleep 2
              NGINX_ELAPSED=$((NGINX_ELAPSED + 2))
            done
            echo "✅ nginx is ready"

            # ── Issue / refresh certificate (idempotent) ──
            CERTBOT_EMAIL=$(sed -n 's/^CERTBOT_EMAIL=//p' "$CERTBOT_ENV" | head -n 1 | tr -d '[:space:]"')
            if [ -z "${CERTBOT_EMAIL:-}" ]; then
              echo "❌ CERTBOT_EMAIL is missing in $CERTBOT_ENV"
              exit 1
            fi

            echo "▶ Ensuring Let's Encrypt certificate is issued for $DOMAIN..."
            if ! docker compose -f "$COMPOSE_FILE" run --rm --entrypoint certbot certbot certonly \
              --webroot \
              --webroot-path=/var/www/certbot \
              --domain "$DOMAIN" \
              --email "$CERTBOT_EMAIL" \
              --agree-tos \
              --non-interactive \
              --keep-until-expiring \
              --cert-name "$DOMAIN"; then
              echo "❌ Certificate issuance/refresh failed"
              docker compose -f "$COMPOSE_FILE" logs --tail=100 nginx
              exit 1
            fi

            echo "▶ Reloading nginx certificate..."
            docker exec itrade-nginx nginx -s reload

            echo "▶ Starting certbot renewal service..."
            docker compose -f "$COMPOSE_FILE" up -d --no-build certbot

            echo "▶ Ensuring nginx reload cron exists for renewed certificates..."
            CRON_MARKER="# iTrade nginx SSL reload"
            CRON_JOB="0 */12 * * * docker exec itrade-nginx nginx -s reload >> /var/log/nginx-reload.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "itrade-nginx nginx -s reload"; then
              (crontab -l 2>/dev/null; echo "$CRON_MARKER"; echo "$CRON_JOB") | crontab -
              echo "✅ Installed nginx reload cron"
            else
              echo "✅ nginx reload cron already present"
            fi

            # ── Wait for web health check ──
            echo "▶ Waiting for web service to be healthy..."
            TIMEOUT=90
            ELAPSED=0
            
            while [ $ELAPSED -lt $TIMEOUT ]; do
              if docker inspect --format='{{.State.Health.Status}}' itrade-web 2>/dev/null | grep -q "healthy"; then
                break
              fi
              sleep 3
              ELAPSED=$((ELAPSED + 3))
              echo "  Waiting... ${ELAPSED}s/${TIMEOUT}s"
            done
            
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "❌ Web service health check timeout"
              docker compose -f "$COMPOSE_FILE" logs --tail=50 web
              exit 1
            fi
            
            DEPLOY_END=$(date +%s)
            echo "✅ Deployment completed in $((DEPLOY_END - DEPLOY_START))s"

            # ── Cleanup ──
            echo "▶ Cleaning up..."
            docker image prune -f >/dev/null 2>&1 || true
            docker logout ghcr.io >/dev/null 2>&1 || true

            # ── Final status ──
            echo "▶ Final container status:"
            docker compose -f "$COMPOSE_FILE" ps

            echo ""
            echo "🎉 Deployment successful!"
            echo "   Total time: $((DEPLOY_END - PULL_START))s"
            echo "   Downloaded: ${FILE_SIZE} bytes (~$((FILE_SIZE / 1024))KB)"
          ENDSSH

      - name: Report deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment succeeded: ${{ github.sha }}"
          else
            echo "❌ Deployment failed: ${{ github.sha }}"
            exit 1
          fi
