# =============================================================
# iTrade — Mobile Release: Build & Publish to Stores
# =============================================================
#
# Trigger: Push to 'main' that modifies apps/mobile/pubspec.yaml,
#          but ONLY if the `version:` line itself has changed.
#          Also supports manual dispatch with optional force flag.
#
# Jobs:
#   1. detect-version  — compare version field against previous commit
#   2. build-android   — ubuntu-latest, build AAB → upload to Google Play
#   3. build-ios       — macos-latest,  build IPA → upload to App Store Connect
#
# NOTE: GitHub-hosted macOS runners (macos-latest = macOS 14 Sonoma,
#       Apple Silicon) are available and include Xcode. They are
#       more expensive (~10× Linux minutes) but required for iOS builds.
#
# ── Required GitHub Secrets ────────────────────────────────────
#
# Android:
#   ANDROID_KEYSTORE_BASE64          base64-encoded .jks/.keystore file
#   ANDROID_KEYSTORE_PASSWORD        storePassword
#   ANDROID_KEY_ALIAS                keyAlias (e.g. my-key-alias)
#   ANDROID_KEY_PASSWORD             keyPassword
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON full JSON of the GCP service account
#                                    with Google Play Developer API access
#
# iOS:
#   IOS_CERTIFICATE_BASE64           base64-encoded Apple Distribution .p12
#   IOS_CERTIFICATE_PASSWORD         password for the .p12 file
#   IOS_KEYCHAIN_PASSWORD            any strong random string (CI-only keychain)
#   IOS_PROVISIONING_PROFILE_BASE64  base64-encoded App Store .mobileprovision
#   APP_STORE_CONNECT_KEY_ID         App Store Connect API key ID  (e.g. ABC1234DEF)
#   APP_STORE_CONNECT_ISSUER_ID      API issuer UUID (from App Store Connect → Keys)
#   APP_STORE_CONNECT_PRIVATE_KEY    contents of the .p8 file (the raw text, not base64)
#
# ── How to base64-encode a file ───────────────────────────────
#   macOS: base64 -i my-release-key.jks | pbcopy
#   Linux: base64 -w 0 my-release-key.jks | xclip
# =============================================================

name: 📱 Mobile Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/pubspec.yaml'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version did not change'
        required: false
        default: false
        type: boolean

concurrency:
  group: mobile-release
  cancel-in-progress: false

# ── Permissions ───────────────────────────────────────────────
# Explicitly grant the GITHUB_TOKEN the minimum scopes needed.
# Without this, repositories with restricted default token
# permissions will get a 403 on checkout.
permissions:
  contents: read

# ── Node.js 24 compatibility ──────────────────────────────────
# GitHub Actions removes Node.js 20 on 2026-09-16 and forces
# Node.js 24 by default from 2026-06-02. Opt in now to avoid
# the forced migration breaking this workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ══════════════════════════════════════════════════════════════
# Job 1: Detect whether the `version:` field actually changed
# ══════════════════════════════════════════════════════════════
jobs:
  detect-version:
    name: 🔍 Detect version change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
      build_number: ${{ steps.check.outputs.build_number }}

    steps:
      - name: Checkout (last 2 commits for diff)
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if version field changed
        id: check
        run: |
          FORCE="${{ github.event.inputs.force_build }}"

          # Parse current version (e.g. 1.1.0+43  →  version=1.1.0, build=43)
          CURRENT=$(grep '^version:' apps/mobile/pubspec.yaml | head -1 | awk '{print $2}')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$CURRENT" | cut -d'+' -f2)
          echo "version=${VERSION_NAME}"   >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

          echo "Current version: ${CURRENT}"

          # Force mode — skip the diff check entirely
          if [ "$FORCE" = "true" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Force build enabled — proceeding regardless of version diff"
            exit 0
          fi

          # Compare against the previous commit's pubspec.yaml
          PREV=$(git show HEAD~1:apps/mobile/pubspec.yaml 2>/dev/null \
                 | grep '^version:' | head -1 | awk '{print $2}' || echo "")

          echo "Previous version: ${PREV:-<not found>}"

          if [ "${CURRENT}" != "${PREV}" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Version changed: ${PREV:-<none>} → ${CURRENT}"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Version unchanged (${CURRENT}) — skipping build"
          fi

  # ══════════════════════════════════════════════════════════════
  # Job 2: Build Android AAB and upload to Google Play
  # ══════════════════════════════════════════════════════════════
  build-android:
    name: 🤖 Android — Build & Publish
    needs: detect-version
    if: needs.detect-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION: ${{ needs.detect-version.outputs.version }}
      BUILD_NUMBER: ${{ needs.detect-version.outputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Validate required secrets early ──────────────────────
      # Fail fast with a clear message instead of deep inside Gradle.
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]          && MISSING="${MISSING}\n  • ANDROID_KEYSTORE_BASE64"
          [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]        && MISSING="${MISSING}\n  • ANDROID_KEYSTORE_PASSWORD"
          [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]                && MISSING="${MISSING}\n  • ANDROID_KEY_ALIAS"
          [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]             && MISSING="${MISSING}\n  • ANDROID_KEY_PASSWORD"
          [ -z "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ] && MISSING="${MISSING}\n  • GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
          if [ -n "$MISSING" ]; then
            printf "❌ Missing required secrets:%b\n" "$MISSING"
            echo ""
            echo "→ Configure them at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required Android secrets are present"

      # ── Java (required by Gradle) ────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter ──────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Environment config files ─────────────────────────────
      # .env / .env.* are git-ignored (root .gitignore) but are
      # declared as Flutter assets in pubspec.yaml. Create them
      # before the build so Flutter can bundle them.
      # Override the API URL via the MOBILE_API_BASE_URL secret;
      # the production URL is used as the default fallback.
      - name: Create Flutter env files
        working-directory: apps/mobile
        run: |
          BASE_URL="${{ secrets.MOBILE_API_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://itrade.ihsueh.com"
          fi
          printf 'API_BASE_URL=%s\n' "$BASE_URL" > .env
          cp .env .env.production
          cp .env .env.development
          echo "✅ Flutter env files created (API_BASE_URL=$BASE_URL)"

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      # ── Android signing ──────────────────────────────────────
      - name: Decode keystore and write key.properties
        working-directory: apps/mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$(pwd)/android/app/release.keystore"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          # Verify the decoded keystore is valid (non-empty and readable)
          if [ ! -s "$KEYSTORE_PATH" ]; then
            echo "❌ Decoded keystore is empty — check ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          fi
          keytool -list -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD" \
            -storetype PKCS12 2>/dev/null \
            || keytool -list -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD" \
            -storetype JKS 2>/dev/null \
            || { echo "❌ Invalid keystore — check ANDROID_KEYSTORE_BASE64 and ANDROID_KEYSTORE_PASSWORD"; exit 1; }

          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=${KEYSTORE_PATH}
          EOF

          echo "✅ Keystore written to ${KEYSTORE_PATH}"

      # ── Build ────────────────────────────────────────────────
      - name: Build release AAB
        working-directory: apps/mobile
        run: |
          flutter build appbundle \
            --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER"

      # ── Artifacts ────────────────────────────────────────────
      - name: Upload AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.VERSION }}+${{ env.BUILD_NUMBER }}
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      # ── Publish ──────────────────────────────────────────────
      # Publishes to the 'internal' testing track as a draft.
      # Promote to alpha/beta/production manually in Play Console,
      # or change `track` and `status` below to automate promotion.
      - name: Publish to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ihsueh.itrade
          releaseFiles: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          # releaseName: "${{ env.VERSION }} (${{ env.BUILD_NUMBER }})"

  # ══════════════════════════════════════════════════════════════
  # Job 3: Build iOS IPA and upload to App Store Connect
  # ══════════════════════════════════════════════════════════════
  build-ios:
    name: 🍎 iOS — Build & Publish
    needs: detect-version
    if: needs.detect-version.outputs.version_changed == 'true'
    # macOS runner — required for Xcode.
    # Apple now requires the iOS 26 SDK (Xcode 26+) for all App Store uploads.
    # macos-15 ships with Xcode 26; macos-latest is still on macOS 14 / Xcode 16
    # which produces an iOS 18.x SDK binary that App Store Connect rejects.
    runs-on: macos-15
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.detect-version.outputs.version }}
      BUILD_NUMBER: ${{ needs.detect-version.outputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Select and Log Xcode version ──────────────────────────
      # Apple requires iOS 26 SDK (Xcode 26+) for App Store uploads.
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Log Xcode version
        run: xcodebuild -version

      # ── Validate required secrets early ──────────────────────
      # Fail fast with a clear message instead of deep inside Xcode.
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.IOS_CERTIFICATE_BASE64 }}" ]            && MISSING="${MISSING}\n  • IOS_CERTIFICATE_BASE64"
          [ -z "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" ]          && MISSING="${MISSING}\n  • IOS_CERTIFICATE_PASSWORD"
          [ -z "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" ]             && MISSING="${MISSING}\n  • IOS_KEYCHAIN_PASSWORD"
          [ -z "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ]   && MISSING="${MISSING}\n  • IOS_PROVISIONING_PROFILE_BASE64"
          [ -z "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" ]          && MISSING="${MISSING}\n  • APP_STORE_CONNECT_KEY_ID"
          [ -z "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" ]       && MISSING="${MISSING}\n  • APP_STORE_CONNECT_ISSUER_ID"
          [ -z "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" ]     && MISSING="${MISSING}\n  • APP_STORE_CONNECT_PRIVATE_KEY"
          if [ -n "$MISSING" ]; then
            printf "❌ Missing required secrets:%b\n" "$MISSING"
            echo ""
            echo "→ Configure them at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required iOS secrets are present"

      # ── Flutter ──────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Environment config files ─────────────────────────────
      # .env / .env.* are git-ignored (root .gitignore) but are
      # declared as Flutter assets in pubspec.yaml. Create them
      # before the build so Flutter can bundle them.
      - name: Create Flutter env files
        working-directory: apps/mobile
        run: |
          BASE_URL="${{ secrets.MOBILE_API_BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://itrade.ihsueh.com"
          fi
          printf 'API_BASE_URL=%s\n' "$BASE_URL" > .env
          cp .env .env.production
          cp .env .env.development
          echo "✅ Flutter env files created (API_BASE_URL=$BASE_URL)"

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      # ── iOS Code Signing ─────────────────────────────────────
      - name: Create signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Add to search list so Xcode can find it
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Import distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          if [ ! -s "$CERT_PATH" ]; then
            echo "❌ Decoded certificate is empty — check IOS_CERTIFICATE_BASE64 secret"
            exit 1
          fi

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12

          # Allow codesign tool to access the key without prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "✅ Certificate imported"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          if [ ! -s "$PP_PATH" ]; then
            echo "❌ Decoded provisioning profile is empty — check IOS_PROVISIONING_PROFILE_BASE64 secret"
            exit 1
          fi

          # Extract UUID so we can store the profile under its canonical name
          PROFILE_UUID=$(security cms -D -i "$PP_PATH" \
            | plutil -extract UUID raw -)

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PP_PATH" "$PROFILES_DIR/${PROFILE_UUID}.mobileprovision"
          echo "✅ Provisioning profile installed: ${PROFILE_UUID}"

      # ── FIX: Complete ExportOptions.plist at runtime ──────────
      # apps/mobile/ios/ExportOptions.plist exists in the repo but is
      # intentionally incomplete: it omits `teamID` (required by Xcode
      # for manual signing) and leaves `provisioningProfiles` commented
      # out. This step overwrites it with a fully populated version
      # derived from the provisioning profile secret — no extra secrets
      # needed.
      - name: Generate ExportOptions.plist
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"

          TEAM_ID=$(security cms -D -i "$PP_PATH" | plutil -extract TeamIdentifier.0 raw -)
          APP_ID=$(security cms -D -i "$PP_PATH" | plutil -extract Entitlements.application-identifier raw -)
          BUNDLE_ID="${APP_ID#*.}"   # strip the TEAMID. prefix
          PROFILE_NAME=$(security cms -D -i "$PP_PATH" | plutil -extract Name raw -)

          echo "📦 Team ID:   $TEAM_ID"
          echo "📦 Bundle ID: $BUNDLE_ID"
          echo "📦 Profile:   $PROFILE_NAME"

          mkdir -p apps/mobile/ios
          cat > apps/mobile/ios/ExportOptions.plist << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          PLISTEOF

          echo "✅ ExportOptions.plist generated"

      # ── Disable Swift Package Manager ───────────────────────
      # Flutter 3.22+ can add SPM integration automatically, but
      # several plugins (sqflite_darwin, sign_in_with_apple, etc.)
      # reference Flutter/Flutter.h in a way that breaks under SPM.
      # Disable SPM so the build uses CocoaPods exclusively, which
      # is fully supported by all plugins in this project.
      - name: Disable Flutter Swift Package Manager
        working-directory: apps/mobile
        run: |
          flutter config --no-enable-swift-package-manager
          echo "✅ Swift Package Manager disabled — using CocoaPods only"

      # ── CocoaPods ────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        working-directory: apps/mobile/ios
        run: |
          # Use system Ruby's gem on macOS runners (avoids rbenv issues)
          sudo gem install cocoapods --no-document 2>/dev/null || gem install cocoapods --no-document
          pod install --repo-update

      # ── Patch entitlements for production ───────────────────
      # Runner.entitlements has aps-environment=development for local
      # debug builds. App Store distribution requires 'production'.
      # Patch it here so the archive is signed correctly without
      # modifying the committed file.
      - name: Patch aps-environment to production
        working-directory: apps/mobile
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :aps-environment production" \
            ios/Runner/Runner.entitlements
          echo "✅ aps-environment set to production"

      # ── Build ────────────────────────────────────────────────
      # ExportOptions.plist at apps/mobile/ios/ExportOptions.plist
      # controls the signing method and distribution type (app-store).
      - name: Build iOS IPA
        working-directory: apps/mobile
        run: |
          flutter build ipa \
            --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=ios/ExportOptions.plist

      # ── Artifacts ────────────────────────────────────────────
      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ env.VERSION }}+${{ env.BUILD_NUMBER }}
          path: apps/mobile/build/ios/ipa/*.ipa
          retention-days: 14

      # ── Publish ──────────────────────────────────────────────
      # Uses App Store Connect API key (recommended over Apple ID + password).
      # The IPA is uploaded to TestFlight; approve for release via App Store Connect.
      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Write the .p8 API key to one of the fixed paths that xcrun altool
          # searches. $RUNNER_TEMP is NOT in altool's search list; ~/.appstoreconnect/private_keys is.
          KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYS_DIR"
          echo "$ASC_PRIVATE_KEY" > "$KEYS_DIR/AuthKey_${ASC_KEY_ID}.p8"

          IPA_PATH=$(find apps/mobile/build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found in build/ios/ipa/"
            exit 1
          fi
          echo "Uploading: $IPA_PATH"

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey  "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --output-format json

      # ── Cleanup ──────────────────────────────────────────────
      - name: Clean up secrets from runner
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f "$RUNNER_TEMP/profile.mobileprovision"
          rm -rf "$HOME/.appstoreconnect/private_keys"
          echo "✅ Temporary secrets removed"
