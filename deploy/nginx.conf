# =============================================================
# Nginx Reverse Proxy for iTrade
# =============================================================
# HTTP-only mode (default).
# To enable HTTPS, see the SSL section below and run certbot.
# =============================================================

# Redirect HTTP to HTTPS (enable after SSL is configured)
# server {
#     listen 80;
#     server_name itrade.ihsueh.com;
#
#     # Certbot ACME challenge
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# -------------------------------------------------------
# HTTP server (active by default — switch to HTTPS later)
# -------------------------------------------------------
server {
    listen 80;
    server_name _;  # Replace with your domain, e.g. itrade.ihsueh.com

    # Allow large uploads (strategy configs etc.)
    client_max_body_size 10M;

    # Certbot ACME challenge (needed even in HTTP mode for cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy all traffic to Next.js web app
    location / {
        proxy_pass         http://web:3002;
        proxy_http_version 1.1;

        # WebSocket support (Next.js / app WebSockets)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── Graceful restart handling ─────────────────────────
        # During a deploy the web container restarts (~15-25s window).
        # If the upstream is temporarily unavailable (error/timeout/502/503),
        # nginx retries the request once before returning a 503 to the client.
        # This hides transient blips caused by container replacement.
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries    2;
        proxy_next_upstream_timeout  30s;
    }
}

